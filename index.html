<!DOCTYPE html>


<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ruler Growth Charts — Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #7BA694; --sage-light: #A8C5BC; --sage-pale: #E8F2EF;
    --blush: #E8A598; --blush-light: #F5D0C8;
    --cream: #FBF8F3; --warm-white: #FFFDF9;
    --charcoal: #2D3B36; --mid: #6B7F78; --light-text: #9BB5AE;
    --card-bg: rgba(255,255,255,0.85);
    --shadow: 0 8px 32px rgba(45,59,54,0.10);
    --shadow-hover: 0 16px 48px rgba(45,59,54,0.16);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; background:var(--cream); color:var(--charcoal); min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; top:-120px; right:-120px; width:400px; height:400px; border-radius:50%; background:radial-gradient(circle,var(--sage-pale) 0%,transparent 70%); pointer-events:none; z-index:0; }
  body::after  { content:''; position:fixed; bottom:-80px; left:-80px; width:320px; height:320px; border-radius:50%; background:radial-gradient(circle,var(--blush-light) 0%,transparent 70%); pointer-events:none; z-index:0; }
  .app { max-width:420px; margin:0 auto; min-height:100vh; position:relative; z-index:1; padding-bottom:110px; }


.header { padding:56px 24px 24px; display:flex; justify-content:space-between; align-items:flex-start; }
.header-logo { display:flex; align-items:center; gap:12px; }
.ruler-icon { width:48px; height:48px; flex-shrink:0; }
.header-title { font-family:‘Playfair Display’,serif; font-size:20px; font-weight:700; color:#5C3D1E; line-height:1.15; }
.header-title span { display:block; font-size:11px; font-family:‘Nunito’,sans-serif; font-weight:700; color:#A07850; letter-spacing:2px; text-transform:uppercase; margin-top:1px; }
.header-actions { display:flex; gap:8px; align-items:center; }
.icon-btn { width:40px; height:40px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; transition:transform 0.2s; flex-shrink:0; }
.icon-btn:hover { transform:scale(1.08); }
.btn-export { background:linear-gradient(135deg,#B8A9D9,#9B8EC4); box-shadow:0 4px 16px rgba(155,142,196,0.35); }


.child-selector { padding:0 24px; display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; align-items:center; }
.child-selector::-webkit-scrollbar { display:none; }
.child-pill { padding:10px 20px; border-radius:999px; border:2px solid transparent; background:var(–card-bg); box-shadow:0 2px 12px rgba(45,59,54,0.08); cursor:pointer; font-family:‘Nunito’,sans-serif; font-weight:700; font-size:14px; color:var(–mid); white-space:nowrap; transition:all 0.2s; backdrop-filter:blur(8px); }
.child-pill.active { background:var(–charcoal); color:white; border-color:var(–charcoal); box-shadow:0 4px 20px rgba(45,59,54,0.25); }
.child-pill:not(.active):hover { border-color:var(–sage-light); color:var(–sage); }
.child-pill-add { padding:10px 18px; border-radius:999px; border:2px dashed var(–sage-light); background:transparent; cursor:pointer; font-family:‘Nunito’,sans-serif; font-weight:700; font-size:13px; color:var(–sage); transition:all 0.2s; white-space:nowrap; flex-shrink:0; }
.child-pill-add:hover { background:var(–sage-pale); border-color:var(–sage); }
.pill-remove { display:inline-flex; align-items:center; justify-content:center; margin-left:6px; width:16px; height:16px; border-radius:50%; background:rgba(255,255,255,0.25); font-size:13px; line-height:1; color:inherit; transition:background 0.15s; }
.child-pill.active .pill-remove:hover { background:rgba(255,255,255,0.45); }
.child-pill:not(.active) .pill-remove:hover { background:rgba(0,0,0,0.1); }


.empty-state { margin:32px 24px; background:var(–card-bg); backdrop-filter:blur(12px); border-radius:24px; padding:48px 24px; box-shadow:var(–shadow); text-align:center; display:none; flex-direction:column; align-items:center; gap:12px; }
.empty-state.visible { display:flex; }
.empty-icon { font-size:48px; }
.empty-title { font-family:‘Playfair Display’,serif; font-size:20px; font-weight:700; color:var(–charcoal); }
.empty-desc { font-size:14px; color:var(–mid); font-weight:600; line-height:1.5; max-width:240px; }
.empty-cta { margin-top:8px; padding:14px 28px; border-radius:999px; border:none; background:linear-gradient(135deg,var(–sage),#5A9283); color:white; font-family:‘Nunito’,sans-serif; font-size:14px; font-weight:800; cursor:pointer; box-shadow:0 4px 20px rgba(90,146,131,0.4); transition:all 0.2s; }
.empty-cta:hover { transform:translateY(-2px); }
.no-child-state { margin:32px 24px; text-align:center; padding:48px 24px; }
.no-child-state .empty-icon { font-size:48px; margin-bottom:12px; }
.no-child-state .empty-title { font-family:‘Playfair Display’,serif; font-size:20px; font-weight:700; color:var(–charcoal); margin-bottom:8px; }
.no-child-state .empty-desc { font-size:14px; color:var(–mid); font-weight:600; }


.data-sections { display:none; }
.data-sections.visible { display:block; }


.stats-row { padding:20px 24px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.stat-card { background:var(–card-bg); backdrop-filter:blur(12px); border-radius:20px; padding:20px; box-shadow:var(–shadow); transition:all 0.25s; position:relative; overflow:hidden; }
.stat-card:hover { transform:translateY(-3px); box-shadow:var(–shadow-hover); }
.stat-card::before { content:’’; position:absolute; top:-20px; right:-20px; width:80px; height:80px; border-radius:50%; opacity:0.12; }
.stat-card.height::before { background:var(–sage); }
.stat-card.weight::before { background:var(–blush); }
.stat-card.bmi::before   { background:#B8A9D9; }
.stat-card.age::before   { background:#F0C980; }
.stat-icon  { font-size:22px; margin-bottom:10px; }
.stat-label { font-size:11px; font-weight:700; color:var(–light-text); letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
.stat-value { font-size:26px; font-weight:900; color:var(–charcoal); line-height:1; }
.stat-unit  { font-size:13px; font-weight:600; color:var(–mid); }
.stat-change { font-size:11px; font-weight:700; color:var(–sage); margin-top:6px; }


.percentile-row { display:flex; gap:10px; padding:0 24px; margin-bottom:20px; }
.percentile-card { flex:1; background:var(–card-bg); backdrop-filter:blur(12px); border-radius:16px; padding:14px; box-shadow:var(–shadow); text-align:center; }
.percentile-label { font-size:10px; font-weight:700; color:var(–light-text); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
.percentile-value { font-size:22px; font-weight:900; color:var(–charcoal); }
.percentile-sub   { font-size:10px; font-weight:600; color:var(–mid); }


.section { padding:0 24px; margin-bottom:20px; }
.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.section-title  { font-family:‘Playfair Display’,serif; font-size:18px; font-weight:700; color:var(–charcoal); }
.section-action { font-size:12px; font-weight:700; color:var(–sage); cursor:pointer; padding:4px 0; }
.section-action:hover { text-decoration:underline; }
.chart-card { background:var(–card-bg); backdrop-filter:blur(12px); border-radius:24px; padding:20px; box-shadow:var(–shadow); }
.chart-tabs { display:flex; gap:8px; margin-bottom:16px; }
.chart-tab { padding:6px 14px; border-radius:999px; border:none; font-family:‘Nunito’,sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.2s; background:var(–sage-pale); color:var(–mid); }
.chart-tab.active { background:var(–sage); color:white; box-shadow:0 2px 10px rgba(123,166,148,0.35); }
.chart-area { position:relative; height:160px; }
svg.chart { width:100%; height:100%; }


.milestone-list { display:flex; flex-direction:column; gap:10px; }
.milestone-item { background
